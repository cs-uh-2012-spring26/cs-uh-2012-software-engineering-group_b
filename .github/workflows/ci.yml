name: CI Pipeline

# Run on every push and PR to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # These environment variables are required by config.py
    # MOCK_DB must be "true" to use mongomock instead of a real DB
    env:
      # Injecting sensitive variables using GitHub Secrets (Task 4 Fix)
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
      SENDGRID_ACCOUNT_EMAIL: ${{ secrets.SENDGRID_ACCOUNT_EMAIL }}
      # Safe configuration flags can remain hard-coded
      DB_NAME: "testdb"
      MOCK_DB: "true"
      DEBUG: "true"

    steps:
    - name: Check out the repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip" 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run tests and check coverage
      run: |
        pytest -vv --verbose --cov-config=.coveragerc --cov=app tests/